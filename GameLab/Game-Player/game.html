<!-- Game Description -->
<body onload="displayDetails()">
    <!-- Div content -->
    <div style="margin:0 auto;text-align:center">

        <!-- Div align in the middle -->
        <div style="margin-left:auto;margin-right:auto;text-align:center">
        <section>
            <h2><div id="gameName"></div></h2>
            <p><div id="gameAuthor"></div></p>
        </section>
        </div>
    </div>
</body>

<!-- Game -->
<section>
    <!-- Div content -->
    <div style="margin:0 auto;text-align:center">

    <!-- Div align in the middle -->
    <div style="margin-left:auto;margin-right:auto;text-align:center">
        <iframe width="100%" height="800px" id="gameFrame"></iframe>
    </div>
</div>
</section>

<!-- Below Game Buttons -->
<div>
    <button class="fullscreen_button" onclick="makeFullScreen(), showHideable()" ><span class="material-icons">fullscreen</span></button>
    <button class="fullscreen_button" id="shareMenuButton"><span class="material-icons">share</span></button>
</div>

<!-- Share Menu -->
<div id="shareMenu" class="modal">

  <!-- Modal content -->
  <div class="modal-content">
    <button class="closeShareMenuButton"><span class="material-icons">close</span></button>
    <h1>Share This Game</h1>
    <a><div id="shareLink"></div></a>
    <button onclick="copyLink()" class="shareButton"><span class="material-icons">content_copy</span></button>
    <a id="twitterLink" target="_blank"><button class="shareButton"><iconify-icon icon="mdi:twitter"></iconify-icon></button></a>
    <a id="facebookLink" target="_blank"><button class="shareButton"><iconify-icon icon="mdi:facebook"></iconify-icon></button></a>
  </div>

</div>

<!-- Unfullscreen Button -->
<div id="hideable" class="unfullscreen_button">
    <button onclick="makeUnfullScreen(), hideHideable()" ><span class="material-icons">fullscreen_exit</span></button>
</div>

<!-- Scripts That Have To Be Here For Some Reason -->

<script src="fullscreen.js"></script>
